name: Build

on:
  workflow_call:
    inputs:
      release:
        required: true
        type: boolean
        default: false
    secrets:
      GORELEASER_KEY:
        required: true
      ORG_HOMEBREW_TAP_APP_KEY:
        required: false
      POLYJUICE_DEPLOY_KEY:
        required: true

permissions:
  contents: write

jobs:
  # Split step - build binaries on each platform
  prepare:
    name: Prepare
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
          - os: macos-latest
            platform: darwin
    runs-on: ${{ matrix.os }}
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Grant access to private repository
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.POLYJUICE_DEPLOY_KEY }}

      - name: Install libpam0g-dev
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-zigbuild
        run: cargo binstall cargo-zigbuild

      - name: Set release flags
        if: inputs.release != true
        run: |
          echo "release_flags=--snapshot" >> $GITHUB_ENV
        shell: bash

      - name: Run GoReleaser Split
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: latest
          args: release --clean --split ${{ env.release_flags }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

      - name: List files in dist directory
        run: find dist -type f | sort
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.platform }}
          path: dist/${{ matrix.platform }}
          retention-days: 1

  # WASM artifact — built once on ubuntu, packed as an npm-style tarball
  # so downstream repos (eventual spackle-web) can `bun add <url>` it.
  # Uses the `nodejs` wasm-pack target since that's what a Bun server
  # will consume; web/bundler targets are still built/smoke-tested in
  # ci.yaml on every PR but aren't shipped as release assets yet.
  wasm:
    name: WASM
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Grant access to private repository
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.POLYJUICE_DEPLOY_KEY }}

      - name: Cache rust
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build WASM (nodejs target)
        # wasm-pack emits a valid npm package.json in the output dir —
        # we hand that dir to `bun pm pack` as-is.
        run: wasm-pack build --target nodejs --out-dir dist-wasm/pkg --features wasm

      - name: Pack WASM tarball
        run: |
          cd dist-wasm/pkg
          bun pm pack --destination ..
          ls -la ..

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: wasm
          path: dist-wasm/spackle-*.tgz
          retention-days: 1

  # WASI Preview 2 component — smoke test only for now. The artifact isn't
  # attached to releases yet (shape still settling; see WASM.md). This job
  # proves the cargo-component build + jco transpile still produce a
  # working wasip2 artifact on every PR.
  wasip2:
    name: WASIP2
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Grant access to private repository
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.POLYJUICE_DEPLOY_KEY }}

      - name: Cache rust
        uses: Swatinem/rust-cache@v2

      - name: Add wasm32-wasip2 target
        run: rustup target add wasm32-wasip2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-component
        run: cargo binstall -y cargo-component

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Run wasip2 smoke tests (Node reference)
        run: just test-wasip2

      # Bun path uses --no-wasi-shim jco output + custom WASI shim.
      # Runs 6 component smoke tests + shim containment unit tests +
      # `bun build --compile` smoke (the compile check catches asset-
      # embedding drift that `bun run` alone would miss).
      - name: Run wasip2 smoke tests (Bun reference + compile-mode)
        run: just test-wasip2-bun

  # Merge step - combine artifacts and create release
  release:
    name: Release
    needs: [prepare, wasm]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Download all build artifacts
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: build-*
          path: dist
          merge-multiple: false

      # Rename folders to remove build- prefix
      - name: Rename artifact folders
        run: |
          cd dist
          for dir in build-*; do
            if [ -d "$dir" ]; then
              mv "$dir" "${dir#build-}"
            fi
          done

      # Download the WASM tarball into the path goreleaser's
      # `release.extra_files` glob expects (./dist-wasm/spackle-*.tgz).
      - name: Download WASM artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm
          path: dist-wasm

      - name: List artifact files
        run: find dist dist-wasm -type f | sort

      - name: Generate tap token
        if: inputs.release == true
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.ORG_HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.ORG_HOMEBREW_TAP_APP_KEY }}
          owner: a2-ai
          repositories: homebrew-tap

      - name: Set release flags
        if: inputs.release != true
        run: |
          echo "release_flags=--snapshot" >> $GITHUB_ENV

      - name: Run GoReleaser Merge
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: latest
          args: continue --merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          TAP_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Pull build artifacts up
        run: |
          find dist -type f -name "spackle_*" -not -path "*/\.*" -not -path "dist/spackle_*" -exec mv {} dist/ \; || true
          ls -la dist/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: dist
          retention-days: 1
