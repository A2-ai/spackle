name: Build

on:
  workflow_call:
    inputs:
      release:
        required: true
        type: boolean
        default: false
    secrets:
      GORELEASER_KEY:
        required: true
      ORG_HOMEBREW_TAP_APP_KEY:
        required: false
      POLYJUICE_DEPLOY_KEY:
        required: true

permissions:
  contents: write

jobs:
  # Split step - build binaries on each platform
  prepare:
    name: Prepare
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
          - os: macos-latest
            platform: darwin
    runs-on: ${{ matrix.os }}
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Grant access to private repository
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.POLYJUICE_DEPLOY_KEY }}

      - name: Install libpam0g-dev
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-zigbuild
        run: cargo binstall cargo-zigbuild

      - name: Set release flags
        if: inputs.release != true
        run: |
          echo "release_flags=--snapshot" >> $GITHUB_ENV
        shell: bash

      - name: Run GoReleaser Split
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: latest
          args: release --clean --split ${{ env.release_flags }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

      - name: List files in dist directory
        run: find dist -type f | sort
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.platform }}
          path: dist/${{ matrix.platform }}
          retention-days: 1

  # WASM artifact — built once on ubuntu, packed as an npm-style tarball
  # so downstream repos (eventual spackle-web) can `bun add <url>` it.
  # Web-target ESM output via wasm-bindgen-cli + wasm-opt; runs in both
  # modern browsers and Bun.
  wasm:
    name: WASM
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Grant access to private repository
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.POLYJUICE_DEPLOY_KEY }}

      - name: Cache rust
        uses: Swatinem/rust-cache@v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      # Pin wasm-bindgen-cli to the exact version of the wasm-bindgen
      # crate — mismatches are the classic wasm-bindgen failure mode.
      # `--force` is load-bearing: Swatinem/rust-cache restores
      # ~/.cargo/.crates.toml so binstall thinks the binaries are
      # installed, but the actual bins in ~/.cargo/bin/ aren't always
      # in the cache. Force-install to guarantee the binary exists.
      - name: Install wasm-bindgen-cli + wasm-opt
        run: |
          WB_VERSION=$(cargo metadata --format-version 1 --locked \
            | jq -r '.packages[] | select(.name == "wasm-bindgen") | .version' | head -1)
          cargo binstall --no-confirm --force wasm-bindgen-cli --version "$WB_VERSION"
          cargo binstall --no-confirm --force wasm-opt

      - name: Build WASM (web)
        run: ./scripts/build-wasm.sh

      - name: Install TS deps
        working-directory: ts
        run: bun install --frozen-lockfile

      - name: Emit TS dist
        working-directory: ts
        run: bunx tsc -p tsconfig.build.json

      # Pack the whole TS package (src, dist, pkg, README) — including
      # the embedded wasm bundle — into an npm-style tarball. `.npmignore`
      # excludes tests / scripts / tsconfig / lockfile.
      - name: Pack TS tarball
        run: |
          mkdir -p dist-ts
          cd ts
          bun pm pack --destination ../dist-ts
          ls -la ../dist-ts

      - name: Upload TS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ts
          path: dist-ts/*.tgz
          retention-days: 1

  # Merge step - combine artifacts and create release
  release:
    name: Release
    needs: [prepare, wasm]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Download all build artifacts
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: build-*
          path: dist
          merge-multiple: false

      # Rename folders to remove build- prefix
      - name: Rename artifact folders
        run: |
          cd dist
          for dir in build-*; do
            if [ -d "$dir" ]; then
              mv "$dir" "${dir#build-}"
            fi
          done

      # Download the WASM tarball into the path goreleaser's
      # `release.extra_files` glob expects (./dist-ts/spackle-*.tgz).
      - name: Download TS artifact
        uses: actions/download-artifact@v8
        with:
          name: ts
          path: dist-ts

      - name: List artifact files
        run: find dist dist-ts -type f | sort

      - name: Generate tap token
        if: inputs.release == true
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.ORG_HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.ORG_HOMEBREW_TAP_APP_KEY }}
          owner: a2-ai
          repositories: homebrew-tap

      - name: Set release flags
        if: inputs.release != true
        run: |
          echo "release_flags=--snapshot" >> $GITHUB_ENV

      - name: Run GoReleaser Merge
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: latest
          args: continue --merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          TAP_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Pull build artifacts up
        run: |
          find dist -type f -name "spackle_*" -not -path "*/\.*" -not -path "dist/spackle_*" -exec mv {} dist/ \; || true
          ls -la dist/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: dist
          retention-days: 1
