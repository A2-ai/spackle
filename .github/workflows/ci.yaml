name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache rust
        uses: Swatinem/rust-cache@v2

      - name: Grant access to private repository
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.POLYJUICE_DEPLOY_KEY }}

      - name: Run tests
        run: cargo test --workspace

      - name: Run clippy
        run: cargo clippy --workspace

      # Smoke-compile the wasm crate on wasm32 to catch target-specific
      # regressions without running a full wasm-pack cycle.
      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown
      - name: Build spackle-wasm for wasm32
        run: cargo build -p spackle-wasm --target wasm32-unknown-unknown

  wasm-pkg:
    name: WASM package (bun test)
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache rust
        uses: Swatinem/rust-cache@v2

      - name: Grant access to private repository
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.POLYJUICE_DEPLOY_KEY }}

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # Build all three wasm-pack targets so nodejs/web/bundler can't
      # silently break. The bun test suite runs against nodejs (the TS
      # wrapper imports eagerly from pkg/nodejs/); web and bundler are
      # compile-smokes until a browser/bundler example exercises them.
      - name: Build WASM (nodejs) for bun test
        run: wasm-pack build crates/spackle-wasm --target nodejs --out-dir ../../wasm/pkg/nodejs
      - name: Build WASM (web) smoke
        run: wasm-pack build crates/spackle-wasm --target web --out-dir ../../wasm/pkg/web
      - name: Build WASM (bundler) smoke
        run: wasm-pack build crates/spackle-wasm --target bundler --out-dir ../../wasm/pkg/bundler

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install bun deps
        working-directory: wasm
        run: bun install --frozen-lockfile

      - name: Run bun test
        working-directory: wasm
        run: bun test

      - name: Type-check wasm package
        working-directory: wasm
        run: bunx tsc --noEmit

      - name: Build TS dist (typings)
        working-directory: wasm
        run: bunx tsc -p tsconfig.build.json
