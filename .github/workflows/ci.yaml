name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache rust
        uses: Swatinem/rust-cache@v2

      - name: Grant access to private repository
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.POLYJUICE_DEPLOY_KEY }}

      - name: Run tests
        run: cargo test --workspace

      - name: Run clippy
        run: cargo clippy --workspace

      - name: Run WASM-feature tests
        run: cargo test --workspace --features wasm

  wasm-poc:
    name: WASM PoC (bun test)
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache rust
        uses: Swatinem/rust-cache@v2

      - name: Grant access to private repository
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.POLYJUICE_DEPLOY_KEY }}

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # Build all three release targets so nodejs/web/bundler can't
      # silently break. `nodejs` lands in poc/pkg because `wasm/index.ts`
      # imports eagerly (the nodejs target instantiates at import time —
      # web/bundler require an async init step and would crash under
      # bun test without it). The other two build into throwaway dirs
      # purely to catch compile regressions.
      - name: Build WASM (nodejs) for bun test
        run: wasm-pack build --target nodejs --out-dir poc/pkg --features wasm
      - name: Build WASM (web) smoke
        run: wasm-pack build --target web --out-dir /tmp/spackle-wasm-web --features wasm
      - name: Build WASM (bundler) smoke
        run: wasm-pack build --target bundler --out-dir /tmp/spackle-wasm-bundler --features wasm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install bun deps
        working-directory: poc
        run: bun install --frozen-lockfile

      - name: Run bun test
        working-directory: poc
        run: bun test

      - name: Type-check poc
        working-directory: poc
        run: bunx tsc --noEmit
