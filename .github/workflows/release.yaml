name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    name: Check version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check version matches tag
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "v$CARGO_VERSION" ]; then
            echo "Version mismatch: tag=$TAG_VERSION, Cargo.toml=v$CARGO_VERSION"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

  build:
    name: Build
    needs: check-version
    uses: ./.github/workflows/build.yaml
    with:
      release: true
    secrets:
      GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
      ORG_HOMEBREW_TAP_APP_KEY: ${{ secrets.ORG_HOMEBREW_TAP_APP_KEY }}
      POLYJUICE_DEPLOY_KEY: ${{ secrets.POLYJUICE_DEPLOY_KEY }}
