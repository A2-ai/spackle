name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    name: Check version
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check version matches tag
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          ROOT_VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          CLI_VERSION=$(grep '^version = ' cli/Cargo.toml | head -1 | cut -d'"' -f2)
          WASM_VERSION=$(grep '^version = ' crates/spackle-wasm/Cargo.toml | head -1 | cut -d'"' -f2)
          TS_VERSION=$(grep '"version":' ts/package.json | head -1 | cut -d'"' -f4)
          if [ "$TAG_VERSION" != "v$ROOT_VERSION" ]; then
            echo "Version mismatch: tag=$TAG_VERSION, Cargo.toml=v$ROOT_VERSION"
            exit 1
          fi
          if [ "$ROOT_VERSION" != "$CLI_VERSION" ]; then
            echo "Version mismatch: Cargo.toml=$ROOT_VERSION, cli/Cargo.toml=$CLI_VERSION"
            exit 1
          fi
          if [ "$ROOT_VERSION" != "$WASM_VERSION" ]; then
            echo "Version mismatch: Cargo.toml=$ROOT_VERSION, crates/spackle-wasm/Cargo.toml=$WASM_VERSION"
            exit 1
          fi
          if [ "$ROOT_VERSION" != "$TS_VERSION" ]; then
            echo "Version mismatch: Cargo.toml=$ROOT_VERSION, ts/package.json=$TS_VERSION"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

  build:
    name: Build
    needs: check-version
    uses: ./.github/workflows/build.yaml
    with:
      release: true
    secrets:
      GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
      ORG_HOMEBREW_TAP_APP_KEY: ${{ secrets.ORG_HOMEBREW_TAP_APP_KEY }}
      POLYJUICE_DEPLOY_KEY: ${{ secrets.POLYJUICE_DEPLOY_KEY }}
