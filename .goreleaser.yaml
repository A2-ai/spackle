# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2
pro: true

project_name: spackle

before:
  hooks:
    - rustup default stable
    - cargo install --locked cargo-zigbuild
    - cargo fetch --locked

builds:
  - id: default
    builder: rust
    flags:
      - --release
      - -p=spackle-cli
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
      - x86_64-apple-darwin
      - aarch64-apple-darwin

archives:
  - ids:
      - default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  prerelease: auto
  # Attach the WASM tarball built by the `wasm` job in build.yaml. The
  # tarball is an npm-style `@a2-ai/spackle` package (all three wasm-pack
  # targets + TS dist + src) installable via: bun add <release-asset-url>
  # Scoped packages get their `/` rewritten to `-` by `bun pm pack`, so
  # the produced filename is `a2-ai-spackle-<version>.tgz`.
  extra_files:
    - glob: ./dist-ts/*.tgz

homebrew_casks:
  - ids:
      - default
    repository:
      owner: a2-ai
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/a2-ai/spackle
    description: A frictionless project templating tool.
    # Remove quarantine from the binary
    # https://goreleaser.com/customization/homebrew_casks/?h=private+homebrew#signing-and-notarizing
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/spackle"]
          end
