# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2
pro: true

project_name: spackle

before:
  hooks:
    - rustup default stable
    - cargo install --locked cargo-zigbuild
    - cargo fetch --locked

builds:
  - id: default
    builder: rust
    flags:
      - -p=spackle-cli
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
      - x86_64-apple-darwin
      - aarch64-apple-darwin
  - id: windows
    builder: rust
    # Use native cargo build for MSVC targets to avoid zig linker flag incompatibilities on Windows runners.
    command: build
    flags:
      - -p=spackle-cli
    targets:
      - x86_64-pc-windows-msvc
      - aarch64-pc-windows-msvc

archives:
  - ids:
      - default
      - windows
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  prerelease: auto

brews:
  - ids:
      - default
    repository:
      owner: a2-ai
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/a2-ai/spackle
    description: A frictionless project templating tool.
    license: MIT
    install: |
      bin.install "spackle"
