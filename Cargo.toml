[package]
name = "spackle"
version = "0.4.3"
edition = "2021"
repository = "https://github.com/a2-ai/spackle"
description = "A frictionless project templating tool."

[workspace]
members = ["cli"]

[dependencies]
async-process = "2.5.0"
async-stream = "0.3.6"
colored = "2.1.0"
fronma = { version = "0.2.0", features = ["toml"] }
getrandom = { version = "0.2.15", features = ["js"] }
polyjuice = { git = "https://github.com/a2-ai/polyjuice", tag = "v0.1.0" }
serde = { version = "1.0.228", features = ["derive"] }
strum_macros = "0.28.0"
tempdir = "0.3.7"
tera = "1.20.1"
thiserror = "1.0.64"
tokio = { version = "1.51.0", features = ["macros", "rt", "rt-multi-thread"] }
tokio-stream = "0.1.18"
toml = "0.8.13"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
users = "0.11.0"
walkdir = "2.5.0"
