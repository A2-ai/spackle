[package]
name = "spackle"
version = "0.4.3"
edition = "2021"
repository = "https://github.com/a2-ai/spackle"
description = "A frictionless project templating tool."

[lib]
crate-type = ["cdylib", "rlib"]

[workspace]
members = ["cli"]

[features]
default = []
wasm = [
    "dep:wasm-bindgen",
    "dep:serde_json",
    "dep:serde-wasm-bindgen",
    "dep:console_error_panic_hook",
]
# WASI Preview 2 component-model build (cargo-component + wit-bindgen + jco).
# Shares `src/api.rs` with the `wasm` feature. Mutually exclusive in practice
# (different targets), but orthogonal as Cargo features.
wasip2 = [
    "dep:wit-bindgen-rt",
    "dep:serde_json",
]

[dependencies]
colored = "3.1.1"
fronma = { version = "0.2.0", features = ["toml"] }
serde = { version = "1.0.228", features = ["derive"] }
strum_macros = "0.28.0"
# tera is declared per-target below so we can use default (builtins on)
# for native and wasm-pack paths, but disable builtins for wasip2 to
# avoid a transitive `slug → wasm-bindgen` dependency that breaks the
# component build.
thiserror = "2.0.18"
toml = "1.1.2"
tracing = "0.1.44"
# WASM-only (optional, enabled by `wasm` feature)
wasm-bindgen = { version = "0.2", optional = true }
serde_json = { version = "1.0", optional = true }
serde-wasm-bindgen = { version = "0.6", optional = true }
console_error_panic_hook = { version = "0.1", optional = true }
# wasip2 component-model runtime (enabled by `wasip2` feature)
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"], optional = true }

# Not compiled when targeting wasm32 — these require OS APIs that don't
# exist on either wasm32-unknown-unknown OR wasm32-wasip2.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
async-process = "2.5.0"
async-stream = "0.3.6"
getrandom = { version = "0.4.2", features = ["wasm_js"] }
polyjuice = { git = "https://github.com/a2-ai/polyjuice", tag = "v0.1.0" }
tempdir = "0.3.7"
tera = "1.20.1"
tokio = { version = "1.52.0", features = ["macros", "rt", "rt-multi-thread"] }
tokio-stream = "0.1.18"
tracing-subscriber = "0.3.23"
users = "0.11.0"

# walkdir works under WASI (wasm32-wasip2 has a sandboxed std::fs). Needed
# by `copy::copy` and `template::fill` when compiled for the component.
[target.'cfg(any(not(target_arch = "wasm32"), target_os = "wasi"))'.dependencies]
walkdir = "2.5.0"

# wasm32-unknown-unknown (browser / wasm-pack path).
# - Full-featured tera (builtins on — matches native behavior).
# - getrandom 0.2 with `js` feature: tera → rand transitively needs a
#   random source, and on the unknown target only the JS shim works.
[target.'cfg(all(target_arch = "wasm32", not(target_os = "wasi")))'.dependencies]
tera = "1.20.1"
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }

# wasm32-wasip2 component path.
# - Tera with default-features disabled: the `builtins` feature pulls
#   in `slug`, which unconditionally depends on wasm-bindgen on wasm32.
#   wit-bindgen/cargo-component can't link wasm-bindgen imports, so the
#   component build fails. Disabling builtins drops `slugify`, `date`,
#   `filesizeformat`, `urlencode`, and rand-based filters — none of the
#   existing fixtures rely on them.
# - getrandom_02 stays OFF (no `js` feature): on WASI, getrandom 0.2
#   has a native backend and pulling in `js` would re-introduce the
#   wasm-bindgen import.
[target.'cfg(all(target_arch = "wasm32", target_os = "wasi"))'.dependencies]
tera = { version = "1.20.1", default-features = false }

[package.metadata.component]
package = "a2ai:spackle"

[package.metadata.component.target]
path = "wit"
world = "spackle"

[profile.release]
opt-level = "s"
lto = true
